name = "qmc5883p_examples"
description = "Examples for QMC5883P sensor"
version = "1.0.0"

authors = ["Max Reznik"]
maintainers = ["Max Reznik <reznikmm@gmail.com>"]
maintainers-logins = ["reznikmm"]
licenses = "Apache-2.0 WITH LLVM-exception"
website = "https://github.com/reznikmm/qmc5883p"
project-files = ["qmc5883p_put/qmc5883p_put.gpr", "qmc5883p_lcd/qmc5883p_lcd.gpr"]

[configuration]
generate_ada = false
generate_c = false
generate_gpr = false

[[depends-on]]
gnat_arm_elf = "*"
qmc5883p = "*"
blinky_stm32_f4ve = "*"

[[pins]]
qmc5883p = { path='..' }
blinky_stm32_f4ve = { url='https://github.com/AdaCore/Ada_Drivers_Library', subdir='examples/stm32_f4ve' }
